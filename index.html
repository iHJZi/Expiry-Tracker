<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1110" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Track important document, card, permit, insurance, and subscription expiry dates."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Expiry Tracker</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>Expiry Tracker</h1>
      </header>

      <main class="main-content">
        <section aria-labelledby="summary-title" class="stack-section">
          <div class="section-heading">
            <h2 id="summary-title">Overview</h2>
          </div>
          <div id="summary-cards" class="summary-grid"></div>
        </section>

        <section aria-labelledby="filter-title" class="stack-section">
          <div class="section-heading">
            <h2 id="filter-title">Filter</h2>
          </div>
          <div class="filter-row" role="tablist" aria-label="Item filters">
            <button class="filter-pill is-active" data-filter="all" type="button">All</button>
            <button class="filter-pill" data-filter="soon" type="button">Soon</button>
            <button class="filter-pill" data-filter="expired" type="button">Expired</button>
            <button class="filter-pill" data-filter="valid" type="button">Valid</button>
            <button class="filter-pill" data-filter="inactive" type="button">Inactive</button>
          </div>
        </section>

        <section aria-labelledby="list-title" class="stack-section stack-section--grow">
          <div class="section-heading">
            <h2 id="list-title">Items</h2>
            <p id="list-caption" class="section-heading__meta"></p>
          </div>
          <div id="item-list" class="item-list" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <button id="add-button" class="fab" type="button" aria-label="Add item">+</button>

    <div id="form-sheet" class="sheet hidden" aria-hidden="true">
      <button class="sheet__scrim" type="button" data-close-sheet="form-sheet" aria-label="Close form"></button>
      <section class="sheet__panel" role="dialog" aria-modal="true" aria-labelledby="form-title">
        <div class="sheet__header">
          <div>
            <p id="form-kicker" class="sheet__kicker">Add item</p>
            <h2 id="form-title">New item</h2>
          </div>
          <button class="icon-button" id="close-form-button" type="button" aria-label="Close">
            Close
          </button>
        </div>

        <form id="item-form" class="item-form" novalidate>
          <label class="field">
            <span class="field__label">Title</span>
            <input id="title-input" name="title" type="text" maxlength="100" required />
          </label>

          <label class="field">
            <span class="field__label">Country</span>
            <input id="country-input" name="country" type="text" maxlength="80" />
          </label>

          <label class="field">
            <span class="field__label">Category</span>
            <input id="category-input" name="category" type="text" list="category-options" maxlength="80" />
          </label>

          <datalist id="category-options">
            <option value="Passport"></option>
            <option value="Visa"></option>
            <option value="Residence Permit"></option>
            <option value="Health Insurance"></option>
            <option value="Liability Insurance"></option>
            <option value="Driving License"></option>
            <option value="Vehicle License"></option>
            <option value="SIM / Contract"></option>
            <option value="Work Permit"></option>
            <option value="Subscription"></option>
            <option value="Other"></option>
          </datalist>

          <label class="field">
            <span class="field__label">Expiry date</span>
            <input id="expiry-date-input" name="expiryDate" type="date" />
          </label>

          <label class="field field--textarea">
            <span class="field__label">Note</span>
            <textarea id="note-input" name="note" rows="4" maxlength="300"></textarea>
          </label>

          <label class="toggle-row" for="active-input">
            <div>
              <span class="field__label">Active</span>
              <p class="toggle-row__hint">Inactive items are treated as not active even if a date is set.</p>
            </div>
            <input id="active-input" name="isActive" type="checkbox" checked />
          </label>

          <div id="form-status-preview" class="status-preview" aria-live="polite"></div>

          <div class="form-actions">
            <button class="button button--ghost" id="cancel-form-button" type="button">Cancel</button>
            <button class="button button--primary" type="submit">Save</button>
          </div>
        </form>
      </section>
    </div>

    <div id="details-sheet" class="sheet hidden" aria-hidden="true">
      <button
        class="sheet__scrim"
        type="button"
        data-close-sheet="details-sheet"
        aria-label="Close details"
      ></button>
      <section class="sheet__panel" role="dialog" aria-modal="true" aria-labelledby="details-title">
        <div class="sheet__header">
          <div>
            <p class="sheet__kicker">Item details</p>
            <h2 id="details-title">Details</h2>
          </div>
          <button class="icon-button" id="close-details-button" type="button" aria-label="Close">
            Close
          </button>
        </div>

        <div id="details-content" class="details-card"></div>

        <div class="form-actions">
          <button class="button button--ghost" id="details-edit-button" type="button">Edit</button>
          <button class="button button--danger" id="details-delete-button" type="button">Delete</button>
        </div>
      </section>
    </div>

    <div id="confirm-sheet" class="sheet hidden" aria-hidden="true">
      <button
        class="sheet__scrim"
        type="button"
        data-close-sheet="confirm-sheet"
        aria-label="Close delete confirmation"
      ></button>
      <section class="sheet__panel sheet__panel--compact" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="sheet__header sheet__header--compact">
          <div>
            <p class="sheet__kicker">Delete item</p>
            <h2 id="confirm-title">Confirm delete</h2>
          </div>
        </div>

        <p id="confirm-message" class="confirm-message"></p>

        <div class="form-actions">
          <button class="button button--ghost" id="cancel-delete-button" type="button">Cancel</button>
          <button class="button button--danger" id="confirm-delete-button" type="button">Delete</button>
        </div>
      </section>
    </div>

    <div id="update-toast" class="update-toast hidden" aria-live="polite" aria-atomic="true">
      <p class="update-toast__text">A newer version is available.</p>
      <button class="button button--primary update-toast__button" id="update-reload-button" type="button">
        Reload
      </button>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
