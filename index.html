<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1110" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Track important document, card, permit, insurance, and subscription expiry dates."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Documents Tracker</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero__top">
          <h1>Documents Tracker</h1>
          <div class="backup-menu" data-backup-menu>
            <button
              id="backup-menu-button"
              class="utility-button"
              type="button"
              aria-label="Backup options"
              aria-expanded="false"
              aria-controls="backup-menu-panel"
            >
              <svg class="utility-button__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M7 8h10M14 5l3 3-3 3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M17 16H7M10 13l-3 3 3 3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <div id="backup-menu-panel" class="backup-menu__panel hidden" role="group" aria-label="Backup actions" aria-hidden="true">
              <div class="backup-menu__actions">
                <button class="button button--ghost" id="export-csv-button" type="button">Export CSV</button>
                <button class="button button--ghost" id="import-csv-button" type="button">Import CSV</button>
              </div>
              <input id="import-csv-input" class="visually-hidden" type="file" accept=".csv,text/csv" />
              <p id="backup-feedback" class="backup-feedback hidden" aria-live="polite"></p>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <section aria-labelledby="summary-title" class="stack-section">
          <div class="section-heading">
            <h2 id="summary-title">Overview</h2>
          </div>
          <div id="summary-cards" class="summary-grid"></div>
        </section>

        <section aria-labelledby="filter-title" class="stack-section">
          <div class="section-heading">
            <h2 id="filter-title">Filter</h2>
          </div>
          <div class="filter-groups">
            <section class="filter-group" aria-labelledby="status-filter-title">
              <p id="status-filter-title" class="filter-group__label">Status</p>
              <div class="filter-row" role="tablist" aria-label="Status filters">
                <button class="filter-pill is-active" data-filter="all" type="button">All</button>
                <button class="filter-pill" data-filter="valid" type="button">Valid</button>
                <button class="filter-pill" data-filter="soon" type="button">Soon</button>
                <button class="filter-pill" data-filter="expired" type="button">Expired</button>
                <button class="filter-pill" data-filter="inactive" type="button">Inactive</button>
              </div>
            </section>
            <section class="filter-group" aria-labelledby="country-filter-title">
              <p id="country-filter-title" class="filter-group__label">Country</p>
              <div id="country-filter-row" class="filter-row" role="tablist" aria-label="Country filters"></div>
            </section>
          </div>
        </section>

        <section id="items-section" aria-labelledby="list-title" class="stack-section stack-section--grow">
          <div class="section-heading">
            <h2 id="list-title">Items</h2>
            <p id="list-caption" class="section-heading__meta"></p>
          </div>
          <div id="item-list" class="item-list" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <button id="add-button" class="fab" type="button" aria-label="Add item">+</button>

    <div id="form-sheet" class="sheet sheet--page hidden" aria-hidden="true">
      <section class="sheet__panel sheet__panel--page" aria-labelledby="form-title">
        <div class="sheet__header">
          <h2 id="form-title" class="visually-hidden">New item</h2>
          <button class="icon-button" id="close-form-button" type="button" aria-label="Back">
            <svg class="icon-button__chevron" viewBox="0 0 12 21" aria-hidden="true" focusable="false">
              <path d="M10 1.5 2 10.5 10 19.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <form id="item-form" class="item-form" novalidate>
          <label class="field">
            <span class="field__label">Name</span>
            <input id="title-input" name="title" type="text" maxlength="100" required />
          </label>

          <label class="field">
            <span class="field__label">Country</span>
            <input id="country-input" name="country" type="text" list="country-options" maxlength="80" />
          </label>

          <datalist id="country-options"></datalist>

          <label class="field">
            <span class="field__label">Category</span>
            <input id="category-input" name="category" type="text" list="category-options" maxlength="80" />
          </label>

          <datalist id="category-options"></datalist>

          <label class="field field--date">
            <span class="field__label">Expiry date</span>
            <span class="field__date-shell">
              <span id="expiry-date-display" class="field__date-display is-placeholder">Select date</span>
              <input id="expiry-date-input" name="expiryDate" type="date" required />
            </span>
          </label>

          <label class="field field--toggle">
            <span class="field__toggle">
              <input id="inactive-input" name="isInactive" type="checkbox" />
              <span class="field__toggle-text">Inactive item?</span>
            </span>
          </label>

          <label class="field field--textarea">
            <span class="field__label">Note</span>
            <textarea id="note-input" name="note" rows="4" maxlength="300"></textarea>
          </label>

          <div id="form-status-preview" class="status-preview" aria-live="polite"></div>

          <div class="form-actions">
            <button class="button button--ghost" id="cancel-form-button" type="button">Cancel</button>
            <button class="button button--primary" type="submit">Save</button>
          </div>
        </form>
      </section>
    </div>

    <div id="details-sheet" class="sheet hidden" aria-hidden="true">
      <button
        class="sheet__scrim"
        type="button"
        data-close-sheet="details-sheet"
        aria-label="Close details"
      ></button>
      <section class="sheet__panel" role="dialog" aria-modal="true" aria-labelledby="details-title">
        <div class="sheet__header">
          <div>
            <p class="sheet__kicker hidden" aria-hidden="true"></p>
            <h2 id="details-title">Details</h2>
          </div>
          <button class="icon-button" id="close-details-button" type="button" aria-label="Close">
            Close
          </button>
        </div>

        <div id="details-content" class="details-card"></div>

        <div class="form-actions">
          <button class="button button--ghost" id="details-edit-button" type="button">Edit</button>
          <button class="button button--danger" id="details-delete-button" type="button">Delete</button>
        </div>
      </section>
    </div>

    <div id="confirm-sheet" class="sheet hidden" aria-hidden="true">
      <button
        class="sheet__scrim"
        type="button"
        data-close-sheet="confirm-sheet"
        aria-label="Close delete confirmation"
      ></button>
      <section class="sheet__panel sheet__panel--compact" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="sheet__header sheet__header--compact">
          <div>
            <p class="sheet__kicker hidden" aria-hidden="true"></p>
            <h2 id="confirm-title">Confirm delete</h2>
          </div>
        </div>

        <p id="confirm-message" class="confirm-message"></p>

        <div class="form-actions">
          <button class="button button--ghost" id="cancel-delete-button" type="button">Cancel</button>
          <button class="button button--danger" id="confirm-delete-button" type="button">Delete</button>
        </div>
      </section>
    </div>

    <div id="update-toast" class="update-toast hidden" aria-live="polite" aria-atomic="true">
      <p class="update-toast__text">A newer version is available.</p>
      <button class="button button--primary update-toast__button" id="update-reload-button" type="button">
        Reload
      </button>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
